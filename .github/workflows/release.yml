name: Release — Edge Daemon + Service Images

# Triggered on versioned tags (e.g. v1.2.3) or manually.
# Produces:
#   • scale-daemon binaries for linux/amd64 and linux/arm64 attached to a GitHub Release
#   • Docker images for all backend services tagged with the version
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  GO_VERSION: '1.25'

jobs:
  # ── 1. Build edge daemon binaries ──────────────────────────────────────────
  build-edge:
    name: Build scale-daemon (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - goarch: amd64
            goos: linux
          - goarch: arm64
            goos: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: edge/scale-daemon/go.sum

      - name: Download dependencies
        working-directory: edge/scale-daemon
        run: go mod download

      - name: Build
        working-directory: edge/scale-daemon
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o scale-daemon-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: scale-daemon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: edge/scale-daemon/scale-daemon-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7

  # ── 2. Create GitHub Release with all edge artefacts ──────────────────────
  release-edge:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-edge
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: scale-daemon-*
          path: dist/
          merge-multiple: true

      - name: Collect release assets
        run: |
          # ── Edge daemon binaries ──────────────────────────────────────────
          mkdir -p release-assets/edge
          find dist/ -type f -name 'scale-daemon-*' -exec cp {} release-assets/edge/ \;
          cp edge/scale-daemon/install.sh           release-assets/edge/install-daemon.sh
          cp edge/scale-daemon/scale-daemon.service release-assets/edge/
          cp edge/scale-daemon/config.example.json  release-assets/edge/

          # ── Backend infra files (keep directory structure — compose uses relative paths) ──
          mkdir -p release-assets/infra/nginx \
                   release-assets/infra/postgres \
                   release-assets/infra/garage \
                   release-assets/docs
          cp infra/docker-compose.prod.yaml         release-assets/infra/
          cp .env.example                           release-assets/
          cp infra/nginx/nginx.prod.conf            release-assets/infra/nginx/
          cp infra/postgres/init-db.sh              release-assets/infra/postgres/
          cp infra/garage/Dockerfile                release-assets/infra/garage/
          cp infra/garage/entrypoint.sh             release-assets/infra/garage/
          cp infra/garage/garage.toml               release-assets/infra/garage/
          cp docs/index.html docs/openapi.yaml      release-assets/docs/

          # ── Observability stack ───────────────────────────────────────────
          mkdir -p release-assets/observability/clickhouse \
                   release-assets/observability/dashboards
          cp observability/docker-compose.yaml              release-assets/observability/
          cp observability/.env.example                     release-assets/observability/
          cp observability/otel-collector-config.yaml       release-assets/observability/
          cp observability/otel-collector-manager-config.yaml release-assets/observability/
          cp observability/blackbox.yml                     release-assets/observability/
          cp observability/seed-dashboards.sh               release-assets/observability/
          cp observability/clickhouse/*.xml                 release-assets/observability/clickhouse/
          cp observability/dashboards/*.json                release-assets/observability/dashboards/

          # ── Top-level deploy script ───────────────────────────────────────
          cp deploy.sh release-assets/

          echo "── Release assets ──────────────────────────"
          find release-assets/ -type f | sort

      - name: Create release ZIP
        run: |
          ZIP_NAME="omnigate-${{ github.ref_name }}.zip"
          (cd release-assets && zip -r "../${ZIP_NAME}" .)
          cp "${ZIP_NAME}" release-assets/
          echo "ZIP size: $(du -sh "${ZIP_NAME}" | cut -f1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OmniGate ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/omnigate-${{ github.ref_name }}.zip
            release-assets/edge/scale-daemon-linux-amd64
            release-assets/edge/scale-daemon-linux-arm64
            release-assets/edge/install-daemon.sh
            release-assets/edge/scale-daemon.service
            release-assets/edge/config.example.json
            release-assets/deploy.sh

  # ── 3. Build & push service Docker images tagged with the version ──────────
  build-services:
    name: Build service image (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service: [auth, core, ingestor, adapter, puller, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/omnigate-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}-release
          cache-to: type=gha,scope=${{ matrix.service }}-release,mode=max
          visibility: public
