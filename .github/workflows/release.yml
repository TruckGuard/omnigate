name: Release — Edge Daemon + Service Images

# Triggered on versioned tags (e.g. v1.2.3) or manually.
# Produces:
#   • scale-daemon binaries for linux/amd64 and linux/arm64 attached to a GitHub Release
#   • Docker images for all backend services tagged with the version
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  GO_VERSION: '1.25'

jobs:
  # ── 1. Build edge daemon binaries ──────────────────────────────────────────
  build-edge:
    name: Build scale-daemon (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - goarch: amd64
            goos: linux
          - goarch: arm64
            goos: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: edge/scale-daemon/go.sum

      - name: Download dependencies
        working-directory: edge/scale-daemon
        run: go mod download

      - name: Build
        working-directory: edge/scale-daemon
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o scale-daemon-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: scale-daemon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: edge/scale-daemon/scale-daemon-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7

  # ── 2. Create GitHub Release with all edge artefacts ──────────────────────
  release-edge:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-edge
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find dist/ -type f -name 'scale-daemon-*' -exec cp {} release-assets/ \;
          cp edge/scale-daemon/install.sh           release-assets/
          cp edge/scale-daemon/scale-daemon.service release-assets/
          cp edge/scale-daemon/config.example.yml   release-assets/
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OmniGate ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*

  # ── 3. Build & push service Docker images tagged with the version ──────────
  build-services:
    name: Build service image (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service: [auth, core, ingestor, adapter, puller, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/omnigate-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}-release
          cache-to: type=gha,scope=${{ matrix.service }}-release,mode=max
          visibility: public
