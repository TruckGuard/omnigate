events {
    worker_connections 1024;
}

http {
    upstream auth {
        server auth:8080;
    }

    upstream ingestor {
        server ingestor:8080;
    }

    upstream core {
        server core:8080;
    }

    upstream garage {
        server garage:3902;
    }

    upstream frontend {
        server frontend:5173;
    }

    # Main gateway
    server {
        listen 80;
        server_name localhost;

        client_max_body_size 20m;

        # Health check for the gateway itself
        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        # Auth service (public login)
        location = /api/auth/login {
            proxy_pass http://auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Auth service (public healthcheck)
        location = /api/auth/health {
            proxy_pass http://auth/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Auth service (protected)
        location /api/auth/ {
            auth_request /auth_validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $permissions $upstream_http_x_permissions;

            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-Permissions $permissions;

            proxy_pass http://auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Ingestor (protected)
        # Supports X-API-Key, Bearer session, and HTTP Digest Auth (ITSAPI cameras).
        location /ingest/ {
            auth_request /auth_validate;
            auth_request_set $source_id    $upstream_http_x_source_id;
            auth_request_set $source_name  $upstream_http_x_source_name;
            auth_request_set $gate_id      $upstream_http_x_gate_id;
            auth_request_set $permissions  $upstream_http_x_permissions;
            # Capture the Digest challenge issued by the auth service on 401.
            # NGINX skips add_header when the value is empty, so this is safe on success.
            auth_request_set $www_auth     $upstream_http_www_authenticate;
            add_header WWW-Authenticate $www_auth always;

            proxy_set_header X-Source-ID   $source_id;
            proxy_set_header X-Source-Name $source_name;
            proxy_set_header X-Gate-ID     $gate_id;
            proxy_set_header X-Permissions $permissions;

            proxy_pass http://ingestor/ingest/;
            proxy_set_header Host $host;
        }

        # Vendor camera push endpoints → Ingestor
        # ANPR cameras push to their own vendor paths (e.g. /NotificationInfo/TollgateInfo).
        # Auth works identically to /ingest/ (Digest or API key via auth_request).
        location /NotificationInfo/ {
            auth_request /auth_validate;
            auth_request_set $source_id    $upstream_http_x_source_id;
            auth_request_set $source_name  $upstream_http_x_source_name;
            auth_request_set $gate_id      $upstream_http_x_gate_id;
            auth_request_set $permissions  $upstream_http_x_permissions;
            auth_request_set $www_auth     $upstream_http_www_authenticate;
            add_header WWW-Authenticate $www_auth always;

            proxy_set_header X-Source-ID   $source_id;
            proxy_set_header X-Source-Name $source_name;
            proxy_set_header X-Gate-ID     $gate_id;
            proxy_set_header X-Permissions $permissions;

            proxy_pass http://ingestor/ingest/event;
            proxy_set_header Host $host;
        }

        # Core API (protected)
        location /api/v1/ {
            auth_request /auth_validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $permissions $upstream_http_x_permissions;

            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-Permissions $permissions;

            proxy_pass http://core/api/v1/;
            proxy_set_header Host $host;
        }

        # Storage access (protected)
        location /data/ {
            auth_request /auth_validate;
            
            # Map /data/ to the Garage website endpoint for the bucket
            proxy_set_header Host truckguard-data.web.garage.localhost;
            proxy_pass http://garage/;
        }

        # Swagger UI and Docs
        location /docs/ {
            alias /docs/;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Frontend (SvelteKit) — catch-all, lowest priority
        # WebSocket upgrade is forwarded so Vite HMR works in dev mode
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # Auth validation (internal)
        # The Authorization header must be forwarded so Digest auth credentials
        # reach the auth service. proxy_pass_request_body off is still safe because
        # the auth service only reads headers for /validate.
        location = /auth_validate {
            internal;
            proxy_pass http://auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length  "";
            proxy_set_header X-Original-URI    $request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header Authorization     $http_authorization;
        }
    }
}
